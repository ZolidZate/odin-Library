<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Odin Project - Library Project</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="scripts/scripts.js" defer></script>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <h1>My Book Library</h1>

            <button type="button" id="add-book-btn">Add Book</button>
        </div>
    
        <div id="book-container">

        </div>
    </div>

    <div id="form-overlay">
        <div class="form-box">

            <form id="add-book-form">
                <button type="button" class="close-form" id="close-form-btn">&times;</button>
                <h2>Add New Book</h2>

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required>
                </div>

                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" required>
                </div>

                <div class="form-group">
                    <label for="pages">Pages</label>
                    <input type="number" id="pages" min="1" required>
                </div>

                <div class="form-group checkbox-group">
                    <input type="checkbox" id="read">
                    <label for="read">Read</label>
                </div>

                <div class="form-group image-upload-group">
                    <label for="cover">Book Cover Image</label>
                    <input type="file" id="cover" accept="image/*">
                </div>

                <button type="submit" class="add-book-btn-form">Add Book</button>
            </form>
        </div>
    </div>

</body>
</html>
